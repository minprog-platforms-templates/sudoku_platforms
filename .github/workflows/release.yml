# Publishes a zip archive of the repository as a GitHub Release after the
# "Checks" workflow succeeds on main. Releases are versioned by date plus the
# run number, e.g. v20260702.42, so each push produces a unique, ordered release.
# Can also be run manually (workflow_dispatch), which skips the checks gate.

name: Release

on:
  workflow_run:
    workflows: ["Checks"]
    types: [completed]
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    # Only release when the checks passed (or when triggered manually).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
    - uses: actions/checkout@v4
      with:
        # Archive the exact commit that passed checks (falls back to the
        # branch head for manual runs).
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}

    - name: Compute version
      id: version
      run: echo "name=$(date -u +'%Y%m%d').${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

    - name: Build zip archive
      run: |
        name="${{ steps.version.outputs.name }}"
        git archive --format=zip --prefix="sudoku_platforms-${name}/" \
          -o "sudoku_platforms-${name}.zip" HEAD

    - name: Publish release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.name }}"
        name: "v${{ steps.version.outputs.name }}"
        target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
        files: "sudoku_platforms-${{ steps.version.outputs.name }}.zip"
